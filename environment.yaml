  - samtools==1.17
  - bcftools
  - pip
  - perl
  - perl-dbi
  - sqlite
  - perl-app-cpanminus
  - gxx_linux-64
  - gcc_linux-64
  - libcurl
  - libv8
  - libgcc-ng  # gcc c
  - libgfortran-ng # gcc fortran
