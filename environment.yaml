  - defaults
dependencies:
  - r-base
  - r-tidyverse
  - r-seurat
  - bioconductor-gmoviz
  - r-biocmanager
  - r-devtools
  - r-ggsci
  - r-signac
  - r-hdf5r
  - r-v8
  - r-rcpp
  - r-rcpparmadillo
  - boost-cpp
  - r-bh
  - r-brms
  - bioconductor-glmgampoi
